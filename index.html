<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMORK Notes Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
body{
  background: radial-gradient(circle at top,#0b1430,#050816);
  color:white;
  font-family:system-ui;
  overflow-x:hidden;
  scroll-behavior:smooth;
}

/* HEADER FLOAT */
h1{
  animation:float 3s ease-in-out infinite;
}
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-5px)}
  100%{transform:translateY(0)}
}

/* GLASS FINTECH STYLE */
.glass{
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(18px);
  border:1px solid rgba(0,140,255,0.25);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  transition:.3s;
}
.glass:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 50px rgba(0,140,255,0.18);
}

/* INPUT */
input, textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  outline:none;
  background:#0a0f2c;
  color:white;
  border:1px solid rgba(0,140,255,0.2);
}

/* BUTTON */
button{
  transition:.3s;
}
button:hover{
  transform:scale(1.03);
}

/* NOTE CARD */
.card{
  transition:.3s;
}
.card:hover{
  transform:scale(1.03);
}

/* SIDEBAR SOCIAL */
.sidebar{
  position:fixed;
  right:10px;
  top:20%;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.icon{
  width:40px;
  height:40px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:10px;
  background:rgba(0,140,255,0.1);
  border:1px solid rgba(0,140,255,0.2);
  transition:.3s;
}
.icon:hover{
  transform:scale(1.1);
  background:rgba(0,140,255,0.25);
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0a0f2c;
  padding:10px 14px;
  border-radius:10px;
  opacity:0;
  transition:.3s;
}
</style>
</head>

<body class="p-5">

<!-- SIDEBAR SOCIAL HUB -->
<div class="sidebar">
  <a class="icon" href="https://www.instagram.com/smork_frmdaeast" target="_blank"><i class="fa-brands fa-instagram"></i></a>
  <a class="icon" href="https://www.facebook.com/share/1DhHJPTRXL/" target="_blank"><i class="fa-brands fa-facebook"></i></a>
  <a class="icon" href="https://www.linkedin.com/in/smorkfrmdaeast" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
  <a class="icon" href="https://github.com/Smorkfrmdaeast" target="_blank"><i class="fa-brands fa-github"></i></a>
  <a class="icon" href="mailto:ifeanyinuels32@gmail.com"><i class="fa-solid fa-envelope"></i></a>
  <a class="icon" href="https://wa.me/2349019071679" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
</div>

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
  <h1 class="text-xl font-bold">📝 SMORK NOTES PRO</h1>
  <span class="text-blue-400 text-sm">Fintech Workspace UI</span>
</div>

<!-- INPUT -->
<div class="glass p-4 rounded-xl mb-5">
  <input id="title" placeholder="Note title">
  <textarea id="content" class="mt-3" rows="4" placeholder="Write your note..."></textarea>

  <button onclick="addNote()"
  class="bg-blue-500 px-4 py-2 rounded mt-3 w-full">
    Add Note
  </button>
</div>

<!-- SEARCH -->
<input id="search" oninput="filterNotes(this.value)"
placeholder="Search notes..." class="mb-5"/>

<!-- NOTES -->
<div id="notes" class="grid md:grid-cols-3 gap-4"></div>

<div id="toast" class="toast"></div>

<script>
let notes = JSON.parse(localStorage.getItem("smork_notes_pro")) || [];

render();

/* ADD NOTE */
function addNote(){
  let title=document.getElementById("title").value;
  let content=document.getElementById("content").value;

  if(!title || !content){
    toast("Fill all fields ⚠️");
    return;
  }

  notes.unshift({
    title,
    content,
    time:new Date().toLocaleString()
  });

  localStorage.setItem("smork_notes_pro",JSON.stringify(notes));

  document.getElementById("title").value="";
  document.getElementById("content").value="";

  render();
  toast("Saved in cloud style UI 🚀");
}

/* DELETE */
function del(i){
  notes.splice(i,1);
  localStorage.setItem("smork_notes_pro",JSON.stringify(notes));
  render();
  toast("Deleted ❌");
}

/* SEARCH */
function filterNotes(q){
  let filtered = notes.filter(n =>
    n.title.toLowerCase().includes(q.toLowerCase()) ||
    n.content.toLowerCase().includes(q.toLowerCase())
  );
  render(filtered);
}

/* RENDER */
function render(list=notes){
  notesDiv.innerHTML="";

  list.forEach((n,i)=>{
    notesDiv.innerHTML+=`
    <div class="glass p-4 rounded-xl card">
      <h3 class="font-bold text-blue-300">${n.title}</h3>
      <p class="text-gray-300 text-sm mt-2">${n.content}</p>
      <p class="text-gray-500 text-xs mt-2">${n.time}</p>

      <button onclick="del(${i})"
      class="text-red-400 mt-3 text-sm">
        Delete
      </button>
    </div>`;
  });
}

/* TOAST */
function toast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,2000);
}
</script>

</body>
</html>
