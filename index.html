<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMORK Notes Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
body{
  background: radial-gradient(circle at top,#0b1430,#050816);
  color:white;
  font-family:system-ui;
  scroll-behavior:smooth;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:12px;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-between;
  z-index:1000;
}

/* GLASS */
.glass{
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(16px);
  border:1px solid rgba(0,140,255,0.25);
  transition:.3s;
}
.glass:hover{
  transform:translateY(-5px);
}

/* INPUT */
input, textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  background:#0a0f2c;
  border:1px solid rgba(0,140,255,0.2);
  color:white;
}

/* CARD */
.card{
  transition:.3s;
}
.card:hover{
  transform:scale(1.03);
}

/* SECTIONS (2 PAGES) */
section{
  min-height:100vh;
  padding:80px 20px 40px;
}

/* BUTTON */
button{
  transition:.3s;
}
button:hover{
  transform:scale(1.03);
}

/* SIDEBAR SOCIAL */
.sidebar{
  position:fixed;
  right:10px;
  top:30%;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.icon{
  width:40px;
  height:40px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:10px;
  background:rgba(0,140,255,0.1);
  border:1px solid rgba(0,140,255,0.2);
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div>☁️ SMORK APP</div>
  <div class="flex gap-4 text-sm">
    <a href="#page1">Notes</a>
    <a href="#page2">Profile</a>
  </div>
</nav>

<!-- SIDEBAR SOCIAL -->
<div class="sidebar">
  <a class="icon" href="https://www.instagram.com/smork_frmdaeast"><i class="fa-brands fa-instagram"></i></a>
  <a class="icon" href="https://github.com/Smorkfrmdaeast"><i class="fa-brands fa-github"></i></a>
  <a class="icon" href="mailto:ifeanyinuels32@gmail.com"><i class="fa-solid fa-envelope"></i></a>
  <a class="icon" href="https://wa.me/2349019071679"><i class="fa-brands fa-whatsapp"></i></a>
</div>

<!-- PAGE 1 -->
<section id="page1">

<h1 class="text-xl font-bold mb-5">📝 NOTES DASHBOARD</h1>

<div class="glass p-4 rounded-xl mb-5">
  <input id="title" placeholder="Title">
  <textarea id="content" class="mt-3" rows="3" placeholder="Write note..."></textarea>
  <button onclick="addNote()" class="bg-blue-500 px-4 py-2 rounded mt-3 w-full">
    Add Note
  </button>
</div>

<input id="search" oninput="filterNotes(this.value)" placeholder="Search..." class="mb-5"/>

<div id="notes" class="grid md:grid-cols-3 gap-4"></div>

</section>

<!-- PAGE 2 -->
<section id="page2">

<h1 class="text-xl font-bold mb-5">🌐 PROFILE HUB</h1>

<div class="glass p-4 rounded-xl mb-4">
  <h2 class="font-bold">SMORK FRMDAEAST</h2>
  <p class="text-gray-400 text-sm">Software Engineer • Creator • Developer</p>
</div>

<div class="glass p-4 rounded-xl mb-4">
  <p>📧 Email: ifeanyinuels32@gmail.com</p>
  <p>📱 WhatsApp: 09019071679</p>
</div>

<div class="glass p-4 rounded-xl">
  <h3 class="font-bold mb-2">Social Links</h3>
  <p>Instagram, GitHub, LinkedIn, Facebook all connected</p>
</div>

</section>

<script>
let notes = JSON.parse(localStorage.getItem("smork_twopage")) || [];

render();

/* ADD */
function addNote(){
  let t=document.getElementById("title").value;
  let c=document.getElementById("content").value;

  if(!t||!c) return;

  notes.unshift({t,c,time:new Date().toLocaleString()});
  localStorage.setItem("smork_twopage",JSON.stringify(notes));

  render();
}

/* DELETE */
function del(i){
  notes.splice(i,1);
  localStorage.setItem("smork_twopage",JSON.stringify(notes));
  render();
}

/* SEARCH */
function filterNotes(q){
  let f=notes.filter(n=>n.t.toLowerCase().includes(q.toLowerCase()));
  render(f);
}

/* RENDER */
function render(list=notes){
  notesDiv.innerHTML="";
  list.forEach((n,i)=>{
    notesDiv.innerHTML+=`
    <div class="glass p-4 rounded-xl card">
      <h3 class="font-bold">${n.t}</h3>
      <p class="text-sm text-gray-300">${n.c}</p>
      <button onclick="del(${i})" class="text-red-400 mt-2">Delete</button>
    </div>`;
  });
}
</script>

</body>
</html>
