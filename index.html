<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMORK Notes Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
body{
  background: radial-gradient(circle at top,#0b1430,#050816);
  color:white;
  font-family:system-ui;
  scroll-behavior:smooth;
}

nav{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:12px;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-between;
  z-index:1000;
}

.glass{
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(16px);
  border:1px solid rgba(0,140,255,0.25);
  transition:.3s;
}
.glass:hover{ transform:translateY(-5px); }

input, textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  background:#0a0f2c;
  border:1px solid rgba(0,140,255,0.2);
  color:white;
}

.card{ transition:.3s; }
.card:hover{ transform:scale(1.03); }

section{
  min-height:100vh;
  padding:80px 20px 40px;
}

button{ transition:.3s; }
button:hover{ transform:scale(1.03); }

.sidebar{
  position:fixed;
  right:10px;
  top:30%;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.icon{
  width:40px;
  height:40px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:10px;
  background:rgba(0,140,255,0.1);
  border:1px solid rgba(0,140,255,0.2);
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div>☁️ SMORK APP</div>
  <div class="flex gap-4 text-sm">
    <a href="#page1">Notes</a>
    <a href="#page2">Profile</a>
  </div>
</nav>

<!-- SIDEBAR -->
<div class="sidebar">
  <a class="icon" href="https://www.instagram.com/smork_frmdaeast"><i class="fa-brands fa-instagram"></i></a>
  <a class="icon" href="https://github.com/Smorkfrmdaeast"><i class="fa-brands fa-github"></i></a>
  <a class="icon" href="mailto:ifeanyinuels32@gmail.com"><i class="fa-solid fa-envelope"></i></a>
  <a class="icon" href="https://wa.me/2349019071679"><i class="fa-brands fa-whatsapp"></i></a>
</div>

<!-- PAGE 1 -->
<section id="page1">

<h1 class="text-xl font-bold mb-5">📝 NOTES DASHBOARD</h1>

<div class="glass p-4 rounded-xl mb-5">
  <input id="title" placeholder="Title">
  <textarea id="content" class="mt-3" rows="3" placeholder="Write note..."></textarea>
  <button onclick="addNote()" class="bg-blue-500 px-4 py-2 rounded mt-3 w-full">
    Add Note
  </button>
</div>

<input id="search" oninput="filterNotes(this.value)" placeholder="Search..." class="mb-5"/>

<div id="notes"></div>

</section>

<!-- PAGE 2 -->
<section id="page2">

<h1 class="text-xl font-bold mb-5">🌐 PROFILE HUB</h1>

<div class="glass p-4 rounded-xl mb-4">
  <h2 class="font-bold">SMORK FRMDAEAST</h2>
  <p class="text-gray-400 text-sm">Software Engineer • Creator • Developer</p>
</div>

<div class="glass p-4 rounded-xl mb-4">
  <p>📧 Email: ifeanyinuels32@gmail.com</p>
  <p>📱 WhatsApp: 09019071679</p>
</div>

<div class="glass p-4 rounded-xl">
  <h3 class="font-bold mb-2">Social Links</h3>
  <p>Instagram, GitHub, LinkedIn, Facebook connected</p>
</div>

</section>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  onSnapshot,
  orderBy,
  query
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCVv5EmkyIc3dzQbT30JOkqBwKM_loiImk",
  authDomain: "smork-notes.firebaseapp.com",
  projectId: "smork-notes",
  storageBucket: "smork-notes.firebasestorage.app",
  messagingSenderId: "475258347559",
  appId: "1:475258347559:web:d39935b6f3ad442eb66e02"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const notesRef = collection(db, "notes");

// GLOBAL STATE
let notes = [];
const notesDiv = document.getElementById("notes");

// REALTIME LOAD
const q = query(notesRef, orderBy("time", "desc"));

onSnapshot(q, (snapshot) => {
  notes = [];
  snapshot.forEach((d) => {
    notes.push({ id: d.id, ...d.data() });
  });
  render(notes);
});

// ADD
window.addNote = async function () {
  let title = document.getElementById("title").value;
  let content = document.getElementById("content").value;

  if (!title || !content) return;

  await addDoc(notesRef, {
    title,
    content,
    time: Date.now()
  });

  document.getElementById("title").value = "";
  document.getElementById("content").value = "";
};

// DELETE
window.del = async function (id) {
  await deleteDoc(doc(db, "notes", id));
};

// SEARCH
window.filterNotes = function (q) {
  let filtered = notes.filter(n =>
    n.title.toLowerCase().includes(q.toLowerCase()) ||
    n.content.toLowerCase().includes(q.toLowerCase())
  );
  render(filtered);
};

// RENDER
window.render = function (list = notes) {
  notesDiv.innerHTML = "";

  list.forEach((n) => {
    notesDiv.innerHTML += `
      <div class="glass p-4 rounded-xl card mb-3">
        <h3 class="font-bold">${n.title}</h3>
        <p class="text-gray-300 text-sm mt-2">${n.content}</p>
        <button onclick="del('${n.id}')" class="text-red-400 mt-3 text-sm">
          Delete
        </button>
      </div>
    `;
  });
};
</script>

</body>
</html>
